name: Build & deploy highlights

# Rebuilds data/matches.json from FIFA's public APIs (via fetch_highlights.R)
# and deploys index.html + matches.json to GitHub Pages.
on:
  push:
    branches: [main]
  schedule:
    - cron: '0 * * * *'   # every hour during the tournament
  workflow_dispatch: {}      # manual "Run workflow" button

# Allow the workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time; don't cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true   # fast precompiled binaries

      - name: Install R packages
        run: Rscript -e 'install.packages(c("httr2", "jsonlite"))'

      # Persist the matchId -> highlight cache so finished matches aren't
      # re-fetched on every run (speed only; correctness is fine without it).
      - name: Restore highlight cache
        uses: actions/cache@v4
        with:
          path: data/fifa_videos.json
          key: fifa-videos-${{ github.run_id }}
          restore-keys: fifa-videos-

      - name: Build matches.json
        run: Rscript fetch_highlights.R

      - name: Assemble site
        run: |
          mkdir -p _site
          cp index.html _site/index.html
          cp data/matches.json _site/matches.json

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deploy
        uses: actions/deploy-pages@v4
